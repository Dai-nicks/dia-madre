<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mamá con Amor</title>
    <!-- FAVICON - Cambia esta URL por tu imagen -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/cOoE28W.png">
    <!-- También puedes usar .ico: <link rel="icon" type="image/x-icon" href="tu-icono.ico"> -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-peach-light: #fff8f3;
            --bg-peach: #ffe8d6;
            --bg-peach-deep: #e8c9a0;
            --accent-coral: #e07a5f;
            --accent-coral-dark: #c45a3f;
            --accent-sage: #81b29a;
            --accent-sage-dark: #5a8a6e;
            --cream: #fefae0;
            --cream-dark: #f0e6c8;
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --text-dark: #5a4a3a;
            --rose: #d4a5a5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-peach-light);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* Pétalos flotantes */
        .floating-petals-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .floating-petal {
            position: absolute;
            bottom: -60px;
            animation: floatPetal linear infinite;
            will-change: transform;
        }

        @keyframes floatPetal {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.6);
                opacity: 0;
            }

            5% {
                opacity: 0.8;
            }

            95% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-115vh) rotate(280deg) scale(1) translateX(60px);
                opacity: 0;
            }
        }

        /* Patron floral */
        .floral-pattern {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='30' r='12' fill='%23e07a5f' fill-opacity='0.4'/%3E%3Ccircle cx='42' cy='48' r='8' fill='%23d4a5a5' fill-opacity='0.3'/%3E%3Ccircle cx='78' cy='48' r='8' fill='%23d4a5a5' fill-opacity='0.3'/%3E%3Cellipse cx='60' cy='70' rx='4' ry='18' fill='%2381b29a' fill-opacity='0.35'/%3E%3Cellipse cx='48' cy='90' rx='10' ry='6' fill='%2381b29a' fill-opacity='0.25' transform='rotate(-30 48 90)'/%3E%3Cellipse cx='72' cy='90' rx='10' ry='6' fill='%2381b29a' fill-opacity='0.25' transform='rotate(30 72 90)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Canvas confeti */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 200;
        }

        /* ============================================
           PANTALLA DE BIENVENIDA
           ============================================ */
        .welcome-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            z-index: 500;
            background: linear-gradient(180deg,
                    var(--bg-peach-light) 0%,
                    var(--bg-peach) 30%,
                    var(--bg-peach-deep) 70%,
                    #d4b896 100%);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .welcome-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(224, 122, 95, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(129, 178, 154, 0.12) 0%, transparent 50%);
            pointer-events: none;
        }

        .welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .welcome-icon {
            width: 110px;
            height: 110px;
            margin-bottom: 1.5rem;
            animation: gentlePulse 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes gentlePulse {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }

            50% {
                transform: scale(1.08) rotate(5deg);
            }
        }

        .welcome-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.8rem, 9vw, 4.5rem);
            color: var(--accent-coral);
            text-shadow: 2px 2px 8px rgba(224, 122, 95, 0.2);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 10;
            text-align: center;
            line-height: 1.2;
        }

        .welcome-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--accent-coral-dark);
            font-style: italic;
            margin-bottom: 2.5rem;
            opacity: 0.85;
            letter-spacing: 1px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .welcome-card {
            background: linear-gradient(145deg, var(--cream) 0%, #faf3e0 100%);
            padding: 2.2rem 1.8rem;
            border-radius: 20px;
            box-shadow:
                0 25px 60px rgba(90, 74, 58, 0.2),
                0 8px 20px rgba(90, 74, 58, 0.1);
            width: min(420px, 90vw);
            position: relative;
            z-index: 10;
            border: 2px solid rgba(224, 122, 95, 0.15);
        }

        .welcome-card::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-coral) 0%, var(--accent-coral-dark) 100%);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }

        .welcome-label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-dark);
            font-size: 1.05rem;
            font-style: italic;
            text-align: center;
        }

        .welcome-input {
            width: 100%;
            padding: 1rem 1.3rem;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            border: 2px solid var(--bg-peach-deep);
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            -webkit-appearance: none;
            appearance: none;
        }

        .welcome-input:focus {
            border-color: var(--accent-coral);
            box-shadow: 0 0 0 4px rgba(224, 122, 95, 0.15);
            background: white;
        }

        .welcome-input::placeholder {
            color: #c4a0a0;
        }

        .welcome-button {
            width: 100%;
            padding: 1rem 1.5rem;
            margin-top: 1.3rem;
            font-family: 'Great Vibes', cursive;
            font-size: 1.7rem;
            color: white;
            background: linear-gradient(135deg, var(--accent-coral) 0%, var(--accent-coral-dark) 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 22px rgba(224, 122, 95, 0.35);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .welcome-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .welcome-button:hover::before {
            left: 100%;
        }

        .welcome-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(224, 122, 95, 0.45);
        }

        .welcome-button:active {
            transform: translateY(-1px);
        }

        .welcome-error {
            color: var(--accent-coral);
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            font-style: italic;
        }

        .welcome-error.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================
           PAGINA PRINCIPAL
           ============================================ */
        .main-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            background: linear-gradient(180deg,
                    var(--bg-peach-light) 0%,
                    var(--bg-peach) 25%,
                    var(--bg-peach-deep) 60%,
                    #d4b896 100%);
        }

        .main-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 15% 25%, rgba(224, 122, 95, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%, rgba(129, 178, 154, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 9vw, 5rem);
            color: var(--accent-coral);
            text-shadow: 2px 2px 8px rgba(224, 122, 95, 0.2);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 10;
            animation: titleIn 1s ease-out;
            text-align: center;
            line-height: 1.2;
        }

        @keyframes titleIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(0.95rem, 2.5vw, 1.3rem);
            color: var(--accent-coral-dark);
            font-style: italic;
            margin-bottom: 2rem;
            opacity: 0.85;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 10;
            text-align: center;
            line-height: 1.6;
        }

        /* RAMO DE FLORES */
        .bouquet-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1200px;
        }

        .bouquet {
            position: relative;
            width: clamp(300px, 85vw, 450px);
            height: clamp(380px, 80vw, 550px);
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .bouquet:hover {
            transform: scale(1.03);
        }

        .bouquet.opening {
            z-index: 150;
        }

        /* Jarrón */
        .vase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 40%;
        }

        .vase-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(155deg,
                    #f5e6d3 0%,
                    #e8d5b8 30%,
                    #d4c4a8 60%,
                    #c4b498 100%);
            border-radius: 15% 15% 45% 45% / 10% 10% 30% 30%;
            box-shadow:
                0 20px 50px rgba(90, 74, 58, 0.25),
                inset 0 4px 20px rgba(255, 255, 255, 0.4),
                inset -10px 0 30px rgba(0, 0, 0, 0.05);
        }

        .vase-pattern {
            position: absolute;
            inset: 15%;
            border: 1px solid rgba(224, 122, 95, 0.2);
            border-radius: 10% 10% 35% 35% / 8% 8% 25% 25%;
            pointer-events: none;
        }

        .vase-rim {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 16px;
            background: linear-gradient(180deg, #faf3e0 0%, #e8d5b8 100%);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(90, 74, 58, 0.15);
        }

        /* Flores individuales */
        .flowers-container {
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 75%;
        }

        .flower {
            position: absolute;
            transform-origin: bottom center;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flower-1 {
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 10;
        }

        .flower-2 {
            left: 25%;
            bottom: 5%;
            transform: rotate(-15deg);
            z-index: 8;
        }

        .flower-3 {
            left: 75%;
            bottom: 5%;
            transform: rotate(15deg);
            z-index: 8;
        }

        .flower-4 {
            left: 35%;
            bottom: 10%;
            transform: rotate(-8deg);
            z-index: 6;
        }

        .flower-5 {
            left: 65%;
            bottom: 10%;
            transform: rotate(8deg);
            z-index: 6;
        }

        .flower-6 {
            left: 15%;
            bottom: 15%;
            transform: rotate(-25deg) scale(0.85);
            z-index: 4;
        }

        .flower-7 {
            left: 85%;
            bottom: 15%;
            transform: rotate(25deg) scale(0.85);
            z-index: 4;
        }

        .flower-stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            background: linear-gradient(180deg, var(--accent-sage) 0%, var(--accent-sage-dark) 100%);
            border-radius: 2px;
        }

        .flower-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Tulipán */
        .tulip .flower-stem {
            height: 140px;
        }

        .tulip .flower-head {
            width: 45px;
            height: 50px;
            top: -45px;
        }

        .tulip-petal {
            position: absolute;
            bottom: 0;
            width: 18px;
            height: 40px;
            border-radius: 50% 50% 20% 20%;
            transform-origin: bottom center;
        }

        .tulip-petal:nth-child(1) {
            left: 0;
            transform: rotate(-15deg);
        }

        .tulip-petal:nth-child(2) {
            left: 50%;
            transform: translateX(-50%);
        }

        .tulip-petal:nth-child(3) {
            right: 0;
            transform: rotate(15deg);
        }

        .tulip.coral .tulip-petal {
            background: linear-gradient(180deg, #e07a5f 0%, #c45a3f 100%);
        }

        .tulip.pink .tulip-petal {
            background: linear-gradient(180deg, #d4a5a5 0%, #c49090 100%);
        }

        .tulip.peach .tulip-petal {
            background: linear-gradient(180deg, #f0b8a0 0%, #e0a080 100%);
        }

        .tulip-leaf {
            position: absolute;
            bottom: 30px;
            width: 25px;
            height: 45px;
            background: var(--accent-sage);
            border-radius: 50% 50% 50% 50%;
        }

        .tulip-leaf.left {
            left: -18px;
            transform: rotate(-30deg);
        }

        .tulip-leaf.right {
            right: -18px;
            transform: rotate(30deg);
        }

        /* Rosa */
        .rose .flower-stem {
            height: 130px;
        }

        .rose .flower-head {
            width: 50px;
            height: 50px;
            top: -40px;
        }

        .rose-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #c45a3f 0%, #a04030 100%);
            border-radius: 50%;
        }

        .rose-petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 28px;
            background: linear-gradient(180deg, #e07a5f 0%, #d06a4f 100%);
            border-radius: 50%;
            transform-origin: bottom center;
        }

        .rose-petal:nth-child(2) {
            transform: translate(-50%, -50%) rotate(60deg);
        }

        .rose-petal:nth-child(3) {
            transform: translate(-50%, -50%) rotate(120deg);
        }

        .rose-petal:nth-child(4) {
            transform: translate(-50%, -50%) rotate(180deg);
        }

        .rose-petal:nth-child(5) {
            transform: translate(-50%, -50%) rotate(240deg);
        }

        .rose-petal:nth-child(6) {
            transform: translate(-50%, -50%) rotate(300deg);
        }

        .rose.pink .rose-center {
            background: linear-gradient(135deg, #c49090 0%, #a07070 100%);
        }

        .rose.pink .rose-petal {
            background: linear-gradient(180deg, #d4a5a5 0%, #c49595 100%);
        }

        /* Margarita */
        .daisy .flower-stem {
            height: 135px;
        }

        .daisy .flower-head {
            width: 55px;
            height: 55px;
            top: -42px;
        }

        .daisy-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #f0d060 0%, #e0b840 100%);
            border-radius: 50%;
            z-index: 2;
        }

        .daisy-petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 22px;
            background: linear-gradient(180deg, #fff 0%, #f8f0e8 100%);
            border-radius: 50%;
            transform-origin: center bottom;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.1);
        }

        /* Peonía */
        .peony .flower-stem {
            height: 125px;
        }

        .peony .flower-head {
            width: 60px;
            height: 55px;
            top: -38px;
        }

        .peony-petal {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #f8c8d0 0%, #e8b0b8 100%);
        }

        .peony-petal:nth-child(1) {
            width: 25px;
            height: 28px;
            top: 5px;
            left: 5px;
        }

        .peony-petal:nth-child(2) {
            width: 22px;
            height: 25px;
            top: 8px;
            left: 22px;
        }

        .peony-petal:nth-child(3) {
            width: 20px;
            height: 22px;
            top: 18px;
            left: 10px;
        }

        .peony-petal:nth-child(4) {
            width: 24px;
            height: 26px;
            top: 15px;
            left: 25px;
        }

        .peony-petal:nth-child(5) {
            width: 18px;
            height: 20px;
            top: 25px;
            left: 20px;
            background: linear-gradient(135deg, #f0b8c0 0%, #e0a0a8 100%);
        }

        /* Botón central */
        .bouquet-button {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-coral) 0%, var(--accent-coral-dark) 100%);
            border: none;
            cursor: pointer;
            z-index: 30;
            box-shadow:
                0 8px 30px rgba(224, 122, 95, 0.4),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: buttonGlow 2s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes buttonGlow {

            0%,
            100% {
                box-shadow: 0 8px 30px rgba(224, 122, 95, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.3);
            }

            50% {
                box-shadow: 0 8px 40px rgba(224, 122, 95, 0.6), inset 0 2px 15px rgba(255, 255, 255, 0.4), 0 0 20px rgba(224, 122, 95, 0.3);
            }
        }

        .bouquet-button:hover {
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 12px 40px rgba(224, 122, 95, 0.5);
        }

        .bouquet-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .bouquet-button.hidden {
            animation: buttonExplode 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes buttonExplode {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
        }

        .button-icon {
            width: 40px;
            height: 40px;
        }

        /* Animación de flores abriéndose */
        .bouquet.opening .flower {
            animation: flowerBloom 1s ease-out forwards;
        }

        .bouquet.opening .flower-1 {
            animation-delay: 0.1s;
        }

        .bouquet.opening .flower-2 {
            animation-delay: 0.15s;
        }

        .bouquet.opening .flower-3 {
            animation-delay: 0.15s;
        }

        .bouquet.opening .flower-4 {
            animation-delay: 0.2s;
        }

        .bouquet.opening .flower-5 {
            animation-delay: 0.2s;
        }

        .bouquet.opening .flower-6 {
            animation-delay: 0.25s;
        }

        .bouquet.opening .flower-7 {
            animation-delay: 0.25s;
        }

        @keyframes flowerBloom {
            0% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.1);
            }

            100% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* CARTA EMERGENTE */
        .letter-emerging {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.1);
            width: min(92vw, 600px);
            max-height: 90vh;
            background: linear-gradient(145deg, #fefae0 0%, #f5e6d3 30%, #ede0cc 70%, #e8d5b8 100%);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            box-shadow:
                0 30px 80px rgba(90, 74, 58, 0.35),

            opacity: 0;
            pointer-events: none;
            overflow-y: auto;
            transform-origin: center center;
            -webkit-overflow-scrolling: touch;
        }

        .letter-emerging.visible {
            opacity: 1;
            pointer-events: auto;
            animation: emergeFromBouquet 1.2s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;

        @keyframes emergeFromBouquet {
            0% {
                transform: translate(-50%, -50%) scale(0.08);

            }

            30% {
                opacity: 1;
            }

            60% {
                transform: translate(-50%, -50%) scale(0.85);

            80% {

                return palabras.some(p => listaPalabras.includes(p));
            }

            if (contienePalabra(palabrasMadrina)) {
                return 'madrina';

            if (contienePalabra(palabrasTia)) {
                return 'tia';
            }
            if (contienePalabra(palabrasMami)) {
                return 'mami';
            }
            if (contienePalabra(palabrasAbuelita)) {
                return 'abuelita';
            }
            if (contienePalabra(palabrasTata)) {
                return 'tata';
            }

        // Firmas para cada tipo
        const firmas = {
            mami: 'Tu princesa que te ama',
            madrina: 'Tu ahijada que te ama',
            tia: 'Tu muñeca que te ama',
            abuelita: 'Tu Nica que te adora',
            tata: 'Tu princesa que te adora',
            predeterminada: 'Claudia y Nicoll'
        };

        // ============================================
        // FUNCIÓN PARA OBTENER CARTA
        // ============================================
        function obtenerCarta(tipoCarta, nombre) {
            if (tipoCarta === 'predeterminada') {
                return cartas.predeterminada(nombre);
            }
            return cartas[tipoCarta] || cartas.predeterminada(nombre);
        }

        // ============================================
        // DOM READY
        // ============================================
        document.addEventListener('DOMContentLoaded', function () {
            welcomeScreen = document.getElementById('welcome-screen');
            welcomeInput = document.getElementById('user-name');
            welcomeButton = document.getElementById('welcome-button');
            welcomeError = document.getElementById('welcome-error');
            mainPage = document.getElementById('main-page');
            displayName = document.getElementById('display-name');
            letterName = document.getElementById('letter-name');
            bouquet = document.getElementById('bouquet');
            bouquetButton = document.getElementById('bouquet-button');
            letterEmerging = document.getElementById('letter-emerging');
            letterOverlay = document.getElementById('letter-overlay');
            closeButton = document.getElementById('close-button');
            canvas = document.getElementById('confetti-canvas');
            floatingPetalsContainer = document.getElementById('floating-petals');
            popSound = document.getElementById('pop-sound');
            bgMusic = document.getElementById('bg-music');
            letterBody = document.getElementById('letter-body');
            signatureName = document.getElementById('signature-name');

            if (canvas) {
                ctx = canvas.getContext('2d');
                resizeCanvas();
            }

            setupEvents();
            initFloatingPetals();
            createDaisyPetals();
        });

        // ============================================
        // CREAR PÉTALOS DE MARGARITA
        // ============================================
        function createDaisyPetals() {
            const daisyHead = document.getElementById('daisy-head-1');
            if (!daisyHead) return;

            const petalCount = 12;
            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                petal.className = 'daisy-petal';
                const rotation = (i * 360 / petalCount) - 90;
                petal.style.transform = `translate(-50%, -100%) rotate(${rotation}deg)`;
                daisyHead.appendChild(petal);
            }
        }

        // ============================================
        // EVENTOS
        // ============================================
        function setupEvents() {
            // Pantalla de bienvenida
            if (welcomeButton) {
                welcomeButton.addEventListener('click', submitName);
            }

            if (welcomeInput) {
                welcomeInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') submitName();
                });
            }

            // Ramo
            if (bouquetButton) {
                bouquetButton.addEventListener('click', openBouquet);
            }

            if (closeButton) {
                closeButton.addEventListener('click', closeLetter);
            }

            if (letterOverlay) {
                letterOverlay.addEventListener('click', closeLetter);
            }

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && isOpen) {
                    closeLetter();
                }
            });

            window.addEventListener('resize', resizeCanvas);
        }

        // ============================================
        // ENVIAR NOMBRE
        // ============================================
        function submitName() {
            const name = welcomeInput.value.trim();

            if (name.length < 2) {
                showError('Por favor, escribe tu nombre para continuar.');
                return;
            }

            userName = name;

            // Detectar tipo de carta
            const tipoCarta = detectarTipoCarta(name);

            // Ocultar pantalla de bienvenida
            if (welcomeScreen) {
                welcomeScreen.classList.add('hidden');
            }

            // Mostrar página principal
            setTimeout(function () {
                if (mainPage) {
                    mainPage.style.display = 'flex';
                }

                // Actualizar nombre en todos los lugares
                if (displayName) {
                    displayName.textContent = userName;
                }

                if (letterName) {
                    letterName.textContent = userName;
                }

                // Asignar el contenido de la carta
                if (letterBody) {
                    letterBody.innerHTML = obtenerCarta(tipoCarta, name);
                }

                // Actualizar firma
                if (signatureName) {
                    signatureName.textContent = firmas[tipoCarta] || firmas.predeterminada;
                }
            }, 400);
        }

        function showError(message) {
            if (welcomeError) {
                welcomeError.textContent = message;
                welcomeError.classList.add('visible');
                welcomeInput.style.borderColor = 'var(--accent-coral)';
                welcomeInput.style.animation = 'shake 0.5s ease';

                setTimeout(function () {
                    welcomeError.classList.remove('visible');
                    welcomeInput.style.borderColor = '';
                    welcomeInput.style.animation = '';
                }, 2500);
            }
        }

        // ============================================
        // PARTÍCULAS DE EXPLOSIÓN
        // ============================================
        function createBurstParticles() {
            if (!bouquetButton) return;

            const rect = bouquetButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const colors = ['#e07a5f', '#d4a5a5', '#81b29a', '#f0d060', '#ffb6c1', '#ffd700'];

            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    left: ${centerX}px;
                    top: ${centerY}px;
                    width: ${Math.random() * 12 + 6}px;
                    height: ${Math.random() * 12 + 6}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    pointer-events: none;
                    z-index: 300;
                    animation: particleFly 0.8s ease-out forwards;
                    --tx: ${Math.cos(Math.random() * Math.PI * 2) * (Math.random() * 180 + 80)}px;
                    --ty: ${Math.sin(Math.random() * Math.PI * 2) * (Math.random() * 180 + 80)}px;
                `;

                document.body.appendChild(particle);

                setTimeout(function () {
                    if (particle.parentNode) particle.remove();
                }, 800);
            }
        }

        // ============================================
        // ABRIR RAMO
        // ============================================
        function openBouquet() {
            if (isOpen) return;
            isOpen = true;

            playSound(popSound, 0.5);
            playSound(bgMusic, 0.25);

            // Crear explosión de partículas
            createBurstParticles();

            if (bouquetButton) {
                bouquetButton.classList.add('hidden');
            }

            if (bouquet) {
                bouquet.classList.add('opening');
            }

            launchConfetti();

            setTimeout(function () {
                if (letterOverlay) {
                    letterOverlay.classList.add('visible');
                }
                if (letterEmerging) {
                    letterEmerging.classList.add('visible');
                }
            }, 500);
        }

        // ============================================
        // CERRAR CARTA
        // ============================================
        function closeLetter() {
            if (!isOpen) return;

            if (letterEmerging) {
                letterEmerging.classList.remove('visible');
                letterEmerging.style.opacity = '0';
                letterEmerging.style.transform = 'translate(-50%, -50%) scale(0.1)';
            }

            if (letterOverlay) {
                letterOverlay.classList.remove('visible');
            }

            setTimeout(function () {
                if (letterEmerging) {
                    letterEmerging.style.opacity = '';
                    letterEmerging.style.transform = '';
                }
                if (bouquet) {
                    bouquet.classList.remove('opening');
                }
                if (bouquetButton) {
                    bouquetButton.classList.remove('hidden');
                }
                isOpen = false;
            }, 300);
        }

        // ============================================
        // SONIDOS
        // ============================================
        function playSound(audio, volume) {
            if (audio) {
                audio.currentTime = 0;
                audio.volume = volume;
                audio.play().catch(function () { });
            }
        }

        // ============================================
        // CANVAS
        // ============================================
        function resizeCanvas() {
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }

        // ============================================
        // CONFETI (PÉTALOS)
        // ============================================
        function launchConfetti() {
            if (!ctx || !canvas) return;

            confettiParticles = [];
            const colors = ['#e07a5f', '#d4a5a5', '#81b29a', '#f0d060', '#ffb6c1', '#ffd700', '#ffe8d6'];

            for (let i = 0; i < 180; i++) {
                confettiParticles.push({
                    x: canvas.width / 2 + (Math.random() - 0.5) * 200,
                    y: canvas.height * 0.5,
                    w: Math.random() * 14 + 6,
                    h: Math.random() * 10 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 15,
                    vx: (Math.random() - 0.5) * 18,
                    vy: Math.random() * -20 - 8,
                    gravity: 0.35,
                    opacity: 1,
                    shape: Math.random() > 0.4 ? 'petal' : 'circle',
                    wobble: Math.random() * 10
                });
            }

            animateConfetti();
        }

        function animateConfetti() {
            if (!ctx || !canvas) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let active = false;

            for (let i = 0; i < confettiParticles.length; i++) {
                const p = confettiParticles[i];

                if (p.opacity <= 0) continue;

                active = true;

                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.rotation += p.rotSpeed;
                p.wobble += 0.1;
                p.vx += Math.sin(p.wobble) * 0.3;

                if (p.y > canvas.height - 50) {
                    p.opacity -= 0.03;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.globalAlpha = Math.max(0, p.opacity);
                ctx.fillStyle = p.color;

                if (p.shape === 'petal') {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, Math.max(0.1, p.w / 2), Math.max(0.1, p.h / 2), 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, Math.max(0.1, p.w / 3), 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            if (active) {
                requestAnimationFrame(animateConfetti);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ============================================
        // PÉTALOS FLOTANTES
        // ============================================
        function initFloatingPetals() {
            for (let i = 0; i < 3; i++) {
                setTimeout(createFloatingPetal, i * 800);
            }
            setInterval(createFloatingPetal, 2200);
        }

        function createFloatingPetal() {
            if (!floatingPetalsContainer) return;

            const petal = document.createElement('div');
            petal.className = 'floating-petal';

            const size = Math.random() * 18 + 22;
            const left = Math.random() * 92;
            const duration = Math.random() * 8 + 12;
            const delay = Math.random() * 1.5;

            const colors = ['#e07a5f', '#d4a5a5', '#81b29a', '#f0d060', '#ffb6c1'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            petal.style.left = left + '%';
            petal.style.animationDuration = duration + 's';
            petal.style.animationDelay = delay + 's';

            petal.innerHTML = `<svg width="${size}" height="${size * 1.3}" viewBox="0 0 20 26" fill="${color}">
                <ellipse cx="10" cy="13" rx="8" ry="12" opacity="0.7"/>
            </svg>`;

            floatingPetalsContainer.appendChild(petal);

            setTimeout(function () {
                if (petal.parentNode) petal.remove();
            }, (duration + delay + 2) * 1000);
        }

        // Agregar animación shake y particleFly
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-5px); }
                80% { transform: translateX(5px); }
            }
            @keyframes particleFly {
                0% { 
                    transform: translate(0, 0) scale(1); 
                    opacity: 1; 
                }
                100% { 
                    transform: translate(var(--tx), var(--ty)) scale(0); 
                    opacity: 0; 
                }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
